name: CI/CD Pipeline

on:
  push:
    branches: [ github_cicd ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: adminpass
          POSTGRES_DB: qchatdb
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U admin -d qchatdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://admin:adminpass@localhost:5432/qchatdb

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run basic FastAPI test
      run: |
        python -c "import fastapi"  # Replace with real tests later

  dockerize-and-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/github_cicd'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/qchat-backend:latest

    - name: Run tests
      run: |
        pip install pytest
        pytest tests/

    # TODO: deploy to server through SSH?
